<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK INCOME - Admin Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: radial-gradient(circle at top right, #0f172a, #020617);
            color: #f8fafc; 
            min-height: 100vh;
        }

        .neo-glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.07); 
            border-radius: 1.5rem;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .nav-active { 
            background: #10b981 !important; 
            color: white !important; 
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); 
        }
        
        input, select, textarea {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            outline: none;
            transition: all 0.3s;
        }
        input:focus { border-color: #10b981 !important; }

        .stat-card { border-left: 4px solid #10b981; }
    </style>
</head>
<body class="p-4 lg:p-8 pb-24">

    <div id="login-screen" class="fixed inset-0 bg-[#020617] z-[9999] flex items-center justify-center p-6">
        <div class="neo-glass p-10 w-full max-w-md text-center border-emerald-500/20 shadow-2xl">
            <h1 style="font-family: 'Syncopate', sans-serif;" class="text-xl mb-6 text-white">TK <span class="text-emerald-500">ADMIN</span></h1>
            <input id="admin-pass" type="password" placeholder="ADMIN ACCESS KEY" class="w-full p-4 rounded-2xl mb-4 text-center tracking-[0.3em] font-bold">
            <button onclick="login()" class="w-full py-4 bg-emerald-600 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-emerald-500 transition-all shadow-lg">Authenticate</button>
        </div>
    </div>

    <div id="admin-content" class="hidden max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8 px-2">
            <div>
                <h1 style="font-family: 'Syncopate', sans-serif;" class="text-xl tracking-tighter">TK <span class="text-emerald-500">CONTROL</span></h1>
                <p class="text-[8px] text-emerald-500/50 uppercase font-black tracking-[0.4em]">Elite Protocol Admin v3.0</p>
            </div>
            <button onclick="location.reload()" class="p-3 neo-glass text-red-500 hover:bg-red-500/10 transition-colors">
                <i data-lucide="log-out" class="w-5 h-5"></i>
            </button>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="neo-glass p-6 stat-card">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Total Agents</p>
                <h3 id="stat-users" class="text-2xl font-black text-white">0</h3>
            </div>
            <div class="neo-glass p-6 border-l-4 border-blue-500">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Global Bal.</p>
                <h3 id="stat-total-bal" class="text-2xl font-black text-white">৳ 0</h3>
            </div>
            <div class="neo-glass p-6 border-l-4 border-orange-500">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Pending Pay</p>
                <h3 id="stat-pending" class="text-2xl font-black text-white">0</h3>
            </div>
            <div class="neo-glass p-6 border-l-4 border-purple-500">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Server</p>
                <h3 class="text-sm font-black text-emerald-400 italic">STABLE</h3>
            </div>
        </div>

        <div class="flex gap-2 mb-8 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="showTab('tasks-tab', this)" class="nav-btn nav-active px-8 py-3 neo-glass text-[10px] font-black uppercase tracking-widest flex-shrink-0">Task Links</button>
            <button onclick="showTab('users-tab', this)" class="nav-btn px-8 py-3 neo-glass text-[10px] font-black uppercase tracking-widest flex-shrink-0">Agents</button>
            <button onclick="showTab('withdrawals-tab', this)" class="nav-btn px-8 py-3 neo-glass text-[10px] font-black uppercase tracking-widest flex-shrink-0">Withdrawals</button>
        </div>

        <div id="tasks-tab" class="tab-content active space-y-6">
            <div class="neo-glass p-8 space-y-6 border-t-2 border-emerald-500/30">
                <div class="flex items-center gap-2 mb-2">
                    <i data-lucide="zap" class="w-4 h-4 text-emerald-500"></i>
                    <h3 class="text-xs font-black uppercase tracking-widest">Mining Link Configuration</h3>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <input id="linkWeb1" type="text" class="w-full p-4 rounded-xl text-xs" placeholder="Task 1 URL">
                        <input id="linkWeb2" type="text" class="w-full p-4 rounded-xl text-xs" placeholder="Task 2 URL">
                        <input id="linkWeb3" type="text" class="w-full p-4 rounded-xl text-xs" placeholder="Task 3 URL">
                    </div>
                    <div class="space-y-4">
                        <input id="linkWeb4" type="text" class="w-full p-4 rounded-xl text-xs" placeholder="Task 4 URL">
                        <input id="linkWeb5" type="text" class="w-full p-4 rounded-xl text-xs" placeholder="Task 5 URL">
                        <input id="officialGroup" type="text" class="w-full p-4 rounded-xl text-xs border-blue-500/30" placeholder="Official Telegram Group Link">
                    </div>
                </div>
                <button onclick="saveConfig()" class="w-full py-5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-black text-[11px] uppercase tracking-[0.3em] shadow-lg shadow-emerald-500/10 transition-all">Push Global Update</button>
            </div>
        </div>

        <div id="users-tab" class="tab-content space-y-4">
            <div class="neo-glass overflow-hidden border-t-2 border-emerald-500/30">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white/5 text-[9px] uppercase font-black tracking-widest text-slate-500">
                            <th class="p-5">Agent Detail</th>
                            <th class="p-5 text-center">Refer</th>
                            <th class="p-5 text-right">Balance</th>
                            <th class="p-5 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="user-list" class="text-xs">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="withdrawals-tab" class="tab-content">
            <div id="payout-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, getDoc, onSnapshot, updateDoc, collection, query, orderBy, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDpH_zn1KQPcIsPojC02UzXLdc017e-Unw", projectId: "bdincomezone-767b4" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Security
        const MASTER_KEY = "Riaz@@1207";

        window.login = () => {
            const input = document.getElementById('admin-pass').value;
            if(input === MASTER_KEY) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').classList.remove('hidden');
                initAdmin();
            } else {
                alert("INVALID ACCESS KEY");
            }
        }

        function initAdmin() {
            lucide.createIcons();

            // 1. Sync System Config
            onSnapshot(doc(db, "config", "main"), (s) => {
                const d = s.data(); if(!d) return;
                for(let i=1; i<=5; i++) {
                    const el = document.getElementById(`linkWeb${i}`);
                    if(el) el.value = d[`linkWeb${i}`] || '';
                }
                document.getElementById('officialGroup').value = d.officialGroup || '';
            });

            // 2. Sync Users & Global Stats
            onSnapshot(collection(db, "users"), (s) => {
                document.getElementById('stat-users').innerText = s.size;
                let totalBal = 0;
                const list = document.getElementById('user-list');
                list.innerHTML = '';
                
                s.forEach(uDoc => {
                    const u = uDoc.data();
                    totalBal += (u.balance || 0);
                    list.innerHTML += `
                        <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                            <td class="p-5">
                                <div class="font-black text-white uppercase">${u.name}</div>
                                <div class="text-[8px] font-mono text-slate-600">${u.uid}</div>
                            </td>
                            <td class="p-5 text-center font-bold text-slate-400">${u.totalRefer || 0}</td>
                            <td class="p-5 text-right font-black text-emerald-400">৳${u.balance.toFixed(2)}</td>
                            <td class="p-5 text-right">
                                <button onclick="adjustUser('${u.uid}', ${u.balance})" class="p-2 neo-glass text-emerald-500 hover:bg-emerald-500 hover:text-white transition-all">
                                    <i data-lucide="edit-3" class="w-3 h-3"></i>
                                </button>
                            </td>
                        </tr>`;
                });
                document.getElementById('stat-total-bal').innerText = '৳ ' + Math.floor(totalBal);
                lucide.createIcons();
            });

            // 3. Sync Pending Withdrawals
            onSnapshot(query(collection(db, "withdrawals"), orderBy("time", "desc")), (s) => {
                document.getElementById('stat-pending').innerText = s.size;
                const list = document.getElementById('payout-list');
                list.innerHTML = s.empty ? '<div class="col-span-full text-center p-10 text-slate-600 font-bold uppercase text-[10px] tracking-widest">No Pending Requests</div>' : '';
                
                s.forEach(pDoc => {
                    const p = pDoc.data();
                    list.innerHTML += `
                        <div class="neo-glass p-6 border-l-4 border-orange-500 group">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <p class="text-[9px] font-black text-orange-500 uppercase tracking-widest">${p.method}</p>
                                    <h4 class="text-2xl font-black text-white italic tracking-tighter">৳${p.amount}</h4>
                                </div>
                                <div class="p-2 neo-glass bg-white/5"><i data-lucide="credit-card" class="w-4 h-4 text-slate-500"></i></div>
                            </div>
                            <div class="bg-black/40 p-3 rounded-xl mb-6 border border-white/5">
                                <p class="text-[8px] text-slate-600 font-black uppercase mb-1">Account Number</p>
                                <p class="text-sm font-mono font-bold text-emerald-400">${p.number}</p>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="rejectPay('${pDoc.id}', '${p.uid}', ${p.amount})" class="py-3 neo-glass text-[9px] font-black uppercase text-red-500 hover:bg-red-500 hover:text-white transition-all">Reject</button>
                                <button onclick="approvePay('${pDoc.id}')" class="py-3 bg-emerald-600 rounded-xl text-[9px] font-black uppercase text-white shadow-lg shadow-emerald-500/20">Approve</button>
                            </div>
                        </div>`;
                });
                lucide.createIcons();
            });
        }

        // --- Functions ---
        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('nav-active');
            lucide.createIcons();
        }

        window.saveConfig = async () => {
            const data = {
                officialGroup: document.getElementById('officialGroup').value
            };
            for(let i=1; i<=5; i++) {
                const val = document.getElementById(`linkWeb${i}`).value;
                if(val) data[`linkWeb${i}`] = val;
            }
            await updateDoc(doc(db, "config", "main"), data);
            alert("TK INCOME: GLOBAL PROTOCOL UPDATED!");
        }

        window.adjustUser = async (uid, current) => {
            const newBal = prompt("Enter New Balance:", current);
            if(newBal !== null) {
                await updateDoc(doc(db, "users", uid), { balance: parseFloat(newBal) });
            }
        }

        window.approvePay = async (id) => {
            if(confirm("Mark this as PAID?")) {
                await updateDoc(doc(db, "withdrawals", id), { status: "Success" }); // If you want to keep history
                // or just delete it:
                await deleteDoc(doc(db, "withdrawals", id));
            }
        }

        window.rejectPay = async (id, uid, amt) => {
            if(confirm("Reject and Refund?")) {
                await updateDoc(doc(db, "users", uid), { balance: increment(amt) });
                await deleteDoc(doc(db, "withdrawals", id));
            }
        }

    </script>
</body>
</html>
