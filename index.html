<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK INCOME - Admin Pro v3.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: #020617;
            color: #f8fafc; 
            min-height: 100vh;
        }

        .neo-glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 1.2rem;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .nav-active { 
            background: #10b981 !important; 
            color: white !important; 
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }
        
        input {
            background: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .status-badge {
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="p-4 lg:p-8 pb-24">

    <div id="login-screen" class="fixed inset-0 bg-[#020617] z-[9999] flex items-center justify-center p-6">
        <div class="neo-glass p-10 w-full max-w-md text-center border-emerald-500/20 shadow-2xl">
            <div class="w-16 h-16 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="shield-check" class="w-8 h-8 text-emerald-500"></i>
            </div>
            <h1 style="font-family: 'Syncopate', sans-serif;" class="text-xl mb-6">TK <span class="text-emerald-500">ADMIN</span></h1>
            <input id="admin-pass" type="password" placeholder="ENTER ADMIN KEY" class="w-full p-4 rounded-xl mb-4 text-center font-bold tracking-widest outline-none focus:border-emerald-500/50 transition-all">
            <button onclick="login()" class="w-full py-4 bg-emerald-600 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-emerald-500 transition-all active:scale-95">Verify Protocol</button>
        </div>
    </div>

    <div id="admin-content" class="hidden max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 style="font-family: 'Syncopate', sans-serif;" class="text-xl">TK <span class="text-emerald-500">CONTROL</span></h1>
                <p class="text-[7px] text-emerald-500/50 uppercase tracking-[0.5em]">Global Monitoring Active</p>
            </div>
            <button onclick="location.reload()" class="p-3 neo-glass text-red-500 hover:bg-red-500/10"><i data-lucide="power" class="w-5 h-5"></i></button>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="neo-glass p-5 border-l-4 border-emerald-500">
                <p class="text-[9px] text-slate-500 uppercase font-bold">Total Users</p>
                <h3 id="stat-users" class="text-2xl font-black text-white">0</h3>
            </div>
            <div class="neo-glass p-5 border-l-4 border-blue-500">
                <p class="text-[9px] text-slate-500 uppercase font-bold">Global Bal.</p>
                <h3 id="stat-total-bal" class="text-2xl font-black text-white">৳0</h3>
            </div>
            <div class="neo-glass p-5 border-l-4 border-orange-500">
                <p class="text-[9px] text-slate-500 uppercase font-bold">Pending Pay</p>
                <h3 id="stat-pending" class="text-2xl font-black text-white">0</h3>
            </div>
            <div class="neo-glass p-5 border-l-4 border-purple-500">
                <p class="text-[9px] text-slate-500 uppercase font-bold">Status</p>
                <h3 class="text-xs font-bold text-emerald-400">STABLE</h3>
            </div>
        </div>

        <div class="flex gap-2 mb-8 overflow-x-auto no-scrollbar">
            <button onclick="showTab('tasks-tab', this)" class="nav-btn nav-active px-8 py-3 neo-glass text-[9px] font-bold uppercase flex-shrink-0">Global Config</button>
            <button onclick="showTab('users-tab', this)" class="nav-btn px-8 py-3 neo-glass text-[9px] font-bold uppercase flex-shrink-0">User Base</button>
            <button onclick="showTab('withdrawals-tab', this)" class="nav-btn px-8 py-3 neo-glass text-[9px] font-bold uppercase flex-shrink-0">Withdrawals</button>
        </div>

        <div id="tasks-tab" class="tab-content active">
            <div class="neo-glass p-8 space-y-6">
                <h2 class="text-xs font-black uppercase text-emerald-500 tracking-widest border-b border-white/5 pb-4">System Links & Tasks</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <label class="text-[9px] text-slate-500 uppercase font-bold">Web Tasks (1-5)</label>
                        <input id="linkWeb1" type="text" class="w-full p-4 rounded-xl text-xs" placeholder="Task 1 URL">
                        <input id="linkWeb2" type="text" class="w-full p-4 rounded-xl text-xs" placeholder="Task 2 URL">
                        <input id="linkWeb3" type="text" class="w-full p-4 rounded-xl text-xs" placeholder="Task 3 URL">
                        <input id="linkWeb4" type="text" class="w-full p-4 rounded-xl text-xs" placeholder="Task 4 URL">
                        <input id="linkWeb5" type="text" class="w-full p-4 rounded-xl text-xs" placeholder="Task 5 URL">
                    </div>
                    <div class="space-y-4">
                        <label class="text-[9px] text-slate-500 uppercase font-bold">Community & Others</label>
                        <input id="officialGroup" type="text" class="w-full p-4 rounded-xl text-xs" placeholder="Official Telegram Group">
                        <input id="paymentChannel" type="text" class="w-full p-4 rounded-xl text-xs" placeholder="Payment Proof Channel">
                        <input id="howToWork" type="text" class="w-full p-4 rounded-xl text-xs border-dashed border-emerald-500/30" placeholder="Tutorial Video Link">
                        <div class="p-6 bg-emerald-500/5 rounded-2xl border border-emerald-500/10">
                            <p class="text-[8px] text-slate-400 mb-2 uppercase">Developer Note</p>
                            <p class="text-[10px] italic">সবগুলো লিঙ্ক সঠিক 'https://' সহ ইনপুট দিন। ব্রডকাস্ট করার সাথে সাথে ইউজারের অ্যাপে আপডেট হবে।</p>
                        </div>
                    </div>
                </div>
                <button onclick="saveConfig()" class="w-full py-5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all">Broadcast Global Update</button>
            </div>
        </div>

        <div id="users-tab" class="tab-content">
            <div class="mb-4">
                <input id="user-search" onkeyup="searchUser()" type="text" placeholder="Search user by name or ID..." class="w-full p-4 rounded-xl text-xs neo-glass outline-none focus:border-emerald-500/40">
            </div>
            <div class="neo-glass overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-white/5 text-[9px] uppercase text-slate-500">
                            <tr>
                                <th class="p-5">User Profile</th>
                                <th class="p-5 text-center">Referral</th>
                                <th class="p-5 text-right">Balance</th>
                                <th class="p-5 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="user-list" class="text-xs">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="withdrawals-tab" class="tab-content">
            <div id="payout-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, query, orderBy, deleteDoc, increment, getDocs } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        // Your Config (Don't change if already working)
        const firebaseConfig = { apiKey: "AIzaSyDpH_zn1KQPcIsPojC02UzXLdc017e-Unw", projectId: "bdincomezone-767b4" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const MASTER_KEY = "Riaz@@1207";

        window.login = () => {
            const pass = document.getElementById('admin-pass').value;
            if(pass === MASTER_KEY) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                initAdmin();
            } else { 
                alert("ACCESS DENIED: INVALID SECURITY PROTOCOL"); 
            }
        }

        function initAdmin() {
            lucide.createIcons();

            // Load Config
            onSnapshot(doc(db, "config", "main"), (s) => {
                if(s.exists()){
                    const d = s.data();
                    for(let i=1; i<=5; i++) if(document.getElementById(`linkWeb${i}`)) document.getElementById(`linkWeb${i}`).value = d[`linkWeb${i}`] || '';
                    document.getElementById('officialGroup').value = d.officialGroup || '';
                    document.getElementById('paymentChannel').value = d.paymentChannel || '';
                    document.getElementById('howToWork').value = d.howToWork || '';
                }
            });

            // User Base Monitoring
            onSnapshot(collection(db, "users"), (s) => {
                document.getElementById('stat-users').innerText = s.size;
                let totalBal = 0;
                let userHtml = '';
                s.forEach(uDoc => {
                    const u = uDoc.data();
                    const bal = u.balance || 0;
                    totalBal += bal;
                    userHtml += `
                        <tr class="user-row border-b border-white/5 hover:bg-white/[0.02]" data-name="${(u.name || '').toLowerCase()}" data-id="${uDoc.id}">
                            <td class="p-5">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-emerald-500/10 flex items-center justify-center text-[10px] font-bold text-emerald-500">
                                        ${(u.name || 'A')[0]}
                                    </div>
                                    <div>
                                        <div class="font-bold text-white">${u.name || 'Anonymous'}</div>
                                        <div class="text-[8px] text-slate-600 font-mono">${uDoc.id}</div>
                                    </div>
                                </div>
                            </td>
                            <td class="p-5 text-center">
                                <span class="bg-blue-500/10 text-blue-400 px-2 py-1 rounded text-[10px] font-bold">${u.totalRefer || 0}</span>
                            </td>
                            <td class="p-5 text-right font-black text-emerald-400 italic">৳${bal.toFixed(2)}</td>
                            <td class="p-5 text-right">
                                <button onclick="adjustUser('${uDoc.id}', ${bal})" class="p-2 neo-glass text-emerald-500 hover:bg-emerald-500 hover:text-white transition-all">
                                    <i data-lucide="pencil" class="w-3 h-3"></i>
                                </button>
                            </td>
                        </tr>`;
                });
                document.getElementById('user-list').innerHTML = userHtml;
                document.getElementById('stat-total-bal').innerText = '৳' + Math.floor(totalBal);
                lucide.createIcons();
            });

            // Withdrawals Monitoring
            onSnapshot(query(collection(db, "withdrawals"), orderBy("time", "desc")), (s) => {
                document.getElementById('stat-pending').innerText = s.size;
                const list = document.getElementById('payout-list');
                let payHtml = '';
                
                if(s.empty) {
                    payHtml = '<div class="col-span-full text-center py-20 neo-glass text-[9px] text-slate-600 font-black uppercase">Zero Pending Protocols</div>';
                }

                s.forEach(pDoc => {
                    const p = pDoc.data();
                    payHtml += `
                        <div class="neo-glass p-6 border-l-4 border-orange-500 relative overflow-hidden group">
                            <div class="absolute top-2 right-2 opacity-10 group-hover:opacity-100 transition-opacity">
                                <i data-lucide="clock" class="w-4 h-4 text-orange-500"></i>
                            </div>
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <p class="text-[10px] font-black text-orange-500 uppercase tracking-tighter">${p.method}</p>
                                    <p class="text-[8px] text-slate-500 uppercase font-bold">${new Date(p.time?.toDate()).toLocaleString()}</p>
                                </div>
                                <h4 class="text-2xl font-black text-white italic">৳${p.amount}</h4>
                            </div>
                            <div class="bg-black/40 p-3 rounded-xl mb-4 border border-white/5">
                                <p class="text-[7px] text-slate-500 uppercase mb-1">Target Account</p>
                                <p class="text-sm font-mono font-bold text-emerald-400 select-all">${p.number}</p>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="rejectPay('${pDoc.id}', '${p.uid}', ${p.amount})" class="py-3 neo-glass text-[9px] font-black uppercase text-red-500 hover:bg-red-500/10">Reject</button>
                                <button onclick="approvePay('${pDoc.id}')" class="py-3 bg-emerald-600 rounded-xl text-[9px] font-black uppercase text-white shadow-lg shadow-emerald-500/20 active:scale-95 transition-all">Approve</button>
                            </div>
                        </div>`;
                });
                list.innerHTML = payHtml;
                lucide.createIcons();
            });
        }

        // Action Functions
        window.saveConfig = async () => {
            try {
                const data = { 
                    officialGroup: document.getElementById('officialGroup').value,
                    paymentChannel: document.getElementById('paymentChannel').value,
                    howToWork: document.getElementById('howToWork').value
                };
                for(let i=1; i<=5; i++) {
                    const v = document.getElementById(`linkWeb${i}`).value;
                    data[`linkWeb${i}`] = v;
                }
                await updateDoc(doc(db, "config", "main"), data);
                alert("GLOBAL PROTOCOLS UPDATED SUCCESSFULLY!");
            } catch (e) {
                alert("ERROR: DATABASE NOT RESPONDING");
            }
        }

        window.searchUser = () => {
            const query = document.getElementById('user-search').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(row => {
                const name = row.getAttribute('data-name');
                const id = row.getAttribute('data-id').toLowerCase();
                row.style.display = (name.includes(query) || id.includes(query)) ? '' : 'none';
            });
        }

        window.adjustUser = async (uid, cur) => {
            const n = prompt("ENTER NEW BALANCE FOR AGENT:", cur);
            if(n !== null && !isNaN(n)) {
                await updateDoc(doc(db, "users", uid), { balance: parseFloat(n) });
            }
        }

        window.approvePay = async (id) => {
            if(confirm("MARK WITHDRAWAL AS SUCCESSFUL?")) {
                await deleteDoc(doc(db, "withdrawals", id));
            }
        }

        window.rejectPay = async (id, uid, amt) => {
            if(confirm("REJECT AND REFUND TO USER BALANCE?")) {
                await updateDoc(doc(db, "users", uid), { balance: increment(amt) });
                await deleteDoc(doc(db, "withdrawals", id));
            }
        }

        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('nav-active');
            lucide.createIcons();
        }
    </script>
</body>
    </html>
