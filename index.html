<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Income - Professional Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.3);
            --bg: #05070a;
            --card: rgba(17, 24, 39, 0.7);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #f1f5f9; 
            min-height: 100vh;
        }

        .glass-panel { 
            background: var(--card); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .neo-button {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .neo-button:hover {
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        input, textarea, select { 
            background: rgba(0, 0, 0, 0.4) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            color: #fff !important; 
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="login-screen" class="fixed inset-0 bg-[#05070a] z-[9999] flex items-center justify-center p-6">
        <div class="glass-panel p-10 rounded-[3rem] w-full max-w-md text-center space-y-8 border-emerald-500/20">
            <div class="w-20 h-20 bg-emerald-500/10 rounded-3xl mx-auto flex items-center justify-center border border-emerald-500/30">
                <i data-lucide="shield-check" class="w-10 h-10 text-emerald-500"></i>
            </div>
            <h1 class="text-4xl font-black text-white tracking-tighter">ADMIN <span class="text-emerald-500">LOGIN</span></h1>
            <div class="space-y-4">
                <input id="admin-pass-input" type="password" placeholder="System Password" class="w-full px-6 py-4 rounded-2xl text-center text-lg font-mono">
                <button id="login-btn" class="w-full bg-emerald-600 neo-button py-4 rounded-2xl font-black text-white">UNLOCK ACCESS</button>
                <p id="error-msg" class="text-red-400 text-sm font-semibold hidden">Invalid Password!</p>
            </div>
        </div>
    </div>

    <div id="admin-content" class="max-w-7xl mx-auto hidden">
        
        <header class="flex flex-col lg:flex-row justify-between items-center mb-12 gap-6 bg-slate-900/20 p-8 rounded-[2.5rem] border border-white/5">
            <div class="flex items-center gap-4">
                <div class="p-4 bg-emerald-500/10 rounded-2xl border border-emerald-500/20">
                    <i data-lucide="command" class="w-8 h-8 text-emerald-500"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-white">Control <span class="text-emerald-500">Center</span></h1>
                    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Management v4.2 Pro</p>
                </div>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="flex gap-4">
                    <div class="glass-panel px-8 py-3 rounded-2xl text-center">
                        <p class="text-[10px] text-slate-500 uppercase font-black">Total Users</p>
                        <p id="stat-users" class="text-2xl font-black text-emerald-400">0</p>
                    </div>
                </div>
                <button onclick="logout()" class="p-4 rounded-2xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all">
                    <i data-lucide="log-out"></i>
                </button>
            </div>
        </header>

        <nav class="flex gap-3 mb-10 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="showTab('settings', this)" class="tab-btn active px-8 py-3.5 rounded-2xl font-bold text-sm flex items-center gap-2 whitespace-nowrap border border-white/5">
                <i data-lucide="sliders" class="w-4 h-4"></i> Task Config
            </button>
            <button onclick="showTab('users', this)" class="tab-btn glass-panel px-8 py-3.5 rounded-2xl font-bold text-sm text-slate-400 flex items-center gap-2 whitespace-nowrap border border-white/5">
                <i data-lucide="users" class="w-4 h-4"></i> User Database
            </button>
            <button onclick="showTab('payouts', this)" class="tab-btn glass-panel px-8 py-3.5 rounded-2xl font-bold text-sm text-slate-400 flex items-center gap-2 whitespace-nowrap border border-white/5">
                <i data-lucide="banknote" class="w-4 h-4"></i> Payment Requests
            </button>
            <button onclick="showTab('broadcast', this)" class="tab-btn glass-panel px-8 py-3.5 rounded-2xl font-bold text-sm text-slate-400 flex items-center gap-2 whitespace-nowrap border border-white/5">
                <i data-lucide="bell" class="w-4 h-4"></i> App Notice
            </button>
        </nav>

        <div id="settings" class="tab-content active">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 glass-panel p-8 rounded-[2.5rem] space-y-8">
                    <div class="flex items-center gap-3 border-b border-white/5 pb-4">
                        <i data-lucide="link-2" class="text-emerald-500"></i>
                        <h3 class="font-bold text-lg">Main Task Links (20H Lock)</h3>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-500 uppercase">Daily Task 01</label>
                            <input id="linkWeb1" type="text" placeholder="URL" class="w-full p-4 rounded-xl text-sm">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-500 uppercase">Daily Task 02</label>
                            <input id="linkWeb2" type="text" placeholder="URL" class="w-full p-4 rounded-xl text-sm">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-500 uppercase">Daily Task 03</label>
                            <input id="linkWeb3" type="text" placeholder="URL" class="w-full p-4 rounded-xl text-sm">
                        </div>
                    </div>

                    <div class="flex items-center gap-3 border-b border-white/5 pb-4 pt-6">
                        <i data-lucide="zap" class="text-blue-500"></i>
                        <h3 class="font-bold text-lg text-blue-400">Bonus Ad Links (30M Lock)</h3>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-500 uppercase">Bonus Task 01</label>
                            <input id="linkWeb4" type="text" placeholder="URL" class="w-full p-4 rounded-xl text-sm border-blue-500/20">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-500 uppercase">Bonus Task 02</label>
                            <input id="linkWeb5" type="text" placeholder="URL" class="w-full p-4 rounded-xl text-sm border-blue-500/20">
                        </div>
                    </div>
                </div>
                
                <div class="glass-panel p-8 rounded-[2.5rem] flex flex-col justify-between border-emerald-500/20">
                    <div class="space-y-6">
                        <h3 class="font-bold text-lg border-b border-white/5 pb-4 flex items-center gap-2">
                            <i data-lucide="globe"></i> Support Config
                        </h3>
                        <div class="space-y-4">
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-500 uppercase">Telegram Group</label>
                                <input id="linkTelegram" type="text" class="w-full p-4 rounded-xl text-sm">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-500 uppercase">Admin Support (@)</label>
                                <input id="linkAdmin" type="text" class="w-full p-4 rounded-xl text-sm">
                            </div>
                        </div>
                    </div>
                    <button id="save-btn" class="w-full bg-emerald-600 neo-button py-5 rounded-2xl font-black text-white mt-10 shadow-xl flex items-center justify-center gap-3">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i> UPDATE SYSTEM
                    </button>
                </div>
            </div>
        </div>

        <div id="users" class="tab-content">
            <div class="glass-panel rounded-[2.5rem] overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-black/40 text-[10px] uppercase text-slate-500 font-black">
                            <tr>
                                <th class="p-6 tracking-widest">User Details</th>
                                <th class="p-6 tracking-widest">Wallet Balance</th>
                                <th class="p-6 tracking-widest">Total Refer</th>
                                <th class="p-6 tracking-widest text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="user-list" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="payouts" class="tab-content">
            <div id="payout-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="broadcast" class="tab-content">
            <div class="glass-panel p-12 rounded-[3rem] max-w-2xl mx-auto border-blue-500/20">
                <div class="text-center space-y-4 mb-8">
                    <h2 class="text-3xl font-black text-white italic">Push Global Notice</h2>
                    <p class="text-slate-400 text-sm italic">This message will appear on everyone's dashboard.</p>
                </div>
                <textarea id="broadcast-msg" rows="6" placeholder="Type real-time announcement..." class="w-full p-6 text-lg rounded-[2rem] mb-6"></textarea>
                <div class="flex gap-4">
                    <button id="send-broadcast" class="flex-[2] bg-blue-600 neo-button py-5 rounded-2xl font-black text-white flex items-center justify-center gap-2">
                        <i data-lucide="send"></i> PUBLISH
                    </button>
                    <button id="clear-broadcast" class="flex-1 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white py-5 rounded-2xl font-bold transition-all">
                        CLEAR
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpH_zn1KQPcIsPojC02UzXLdc017e-Unw",
            projectId: "bdincomezone-767b4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const ADMIN_PASSWORD = "Riaz@@1207"; 

        // Login Logic
        document.getElementById('login-btn').onclick = () => {
            if(document.getElementById('admin-pass-input').value === ADMIN_PASSWORD) {
                sessionStorage.setItem('isAdmin', 'true');
                checkAuth();
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        };

        function checkAuth() {
            if(sessionStorage.getItem('isAdmin') === 'true') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').classList.remove('hidden');
                loadConfig();
                syncData();
            }
        }

        window.logout = () => { sessionStorage.removeItem('isAdmin'); location.reload(); };

        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active', 'border-emerald-500');
                b.classList.add('text-slate-400');
            });
            btn.classList.add('active', 'border-emerald-500');
            btn.classList.remove('text-slate-400');
            lucide.createIcons();
        };

        // Load Settings
        async function loadConfig() {
            const snap = await getDoc(doc(db, "config", "main"));
            if(snap.exists()) {
                const d = snap.data();
                for(let i=1; i<=5; i++) document.getElementById('linkWeb'+i).value = d['linkWeb'+i] || '';
                document.getElementById('linkTelegram').value = d.linkTelegram || '';
                document.getElementById('linkAdmin').value = d.linkAdmin || '';
                document.getElementById('broadcast-msg').value = d.announcement || '';
            }
        }

        document.getElementById('save-btn').onclick = async () => {
            const data = {
                linkTelegram: document.getElementById('linkTelegram').value,
                linkAdmin: document.getElementById('linkAdmin').value
            };
            for(let i=1; i<=5; i++) data['linkWeb'+i] = document.getElementById('linkWeb'+i).value;
            await updateDoc(doc(db, "config", "main"), data);
            alert("Settings updated!");
        };

        function syncData() {
            // Users
            onSnapshot(collection(db, "users"), (snap) => {
                document.getElementById('stat-users').innerText = snap.size;
                const list = document.getElementById('user-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const u = d.data();
                    list.innerHTML += `
                        <tr class="hover:bg-white/[0.02]">
                            <td class="p-6">
                                <p class="font-bold text-white">${u.name || 'Anonymous'}</p>
                                <p class="text-[9px] font-mono text-slate-500">${u.uid}</p>
                            </td>
                            <td class="p-6 font-black text-emerald-400">৳ ${(u.balance || 0).toFixed(2)}</td>
                            <td class="p-6 font-bold text-blue-400">${u.totalRefer || 0} Refers</td>
                            <td class="p-6 text-right">
                                <button onclick="editUser('${u.uid}', ${u.balance}, ${u.totalRefer})" class="bg-white/5 hover:bg-emerald-500 p-3 rounded-xl transition-all">
                                    <i data-lucide="edit-3" class="w-4 h-4"></i>
                                </button>
                            </td>
                        </tr>`;
                });
                lucide.createIcons();
            });

            // Payouts
            onSnapshot(collection(db, "withdrawals"), (snap) => {
                const list = document.getElementById('payout-list');
                list.innerHTML = snap.empty ? '<p class="col-span-full text-center text-slate-500 py-20 italic">No pending requests</p>' : '';
                snap.forEach(d => {
                    const w = d.data();
                    list.innerHTML += `
                        <div class="glass-panel p-6 rounded-[2rem] border-l-4 border-l-emerald-500">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <span class="text-[9px] font-black bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full uppercase">${w.method}</span>
                                    <h4 class="text-3xl font-black text-white mt-2">৳ ${w.amount}</h4>
                                </div>
                                <button onclick="rejectPayout('${d.id}', '${w.uid}', ${w.amount})" class="text-red-500 p-2 hover:bg-red-500/10 rounded-lg"><i data-lucide="trash-2"></i></button>
                            </div>
                            <div class="bg-black/30 p-4 rounded-xl mb-4">
                                <p class="text-[10px] text-slate-500 font-bold uppercase">Account Number</p>
                                <p class="font-mono text-white font-bold">${w.number}</p>
                            </div>
                            <button onclick="approvePayout('${d.id}')" class="w-full bg-emerald-600 py-3 rounded-xl font-black text-white text-xs">APPROVE PAYMENT</button>
                        </div>`;
                });
                lucide.createIcons();
            });
        }

        window.editUser = async (uid, bal, ref) => {
            const newBal = prompt("Enter new balance:", bal);
            const newRef = prompt("Enter total refers:", ref);
            if(newBal !== null && newRef !== null) {
                await updateDoc(doc(db, "users", uid), { balance: parseFloat(newBal), totalRefer: parseInt(newRef) });
            }
        };

        window.approvePayout = async (id) => { if(confirm("Approve payment?")) await deleteDoc(doc(db, "withdrawals", id)); };
        window.rejectPayout = async (id, uid, amt) => {
            if(confirm("Reject and refund?")) {
                const snap = await getDoc(doc(db, "users", uid));
                if(snap.exists()) await updateDoc(doc(db, "users", uid), { balance: increment(amt) });
                await deleteDoc(doc(db, "withdrawals", id));
            }
        };

        document.getElementById('send-broadcast').onclick = async () => {
            await updateDoc(doc(db, "config", "main"), { announcement: document.getElementById('broadcast-msg').value });
            alert("Broadcast live!");
        };

        checkAuth();
        lucide.createIcons();
    </script>
</body>
</html>
