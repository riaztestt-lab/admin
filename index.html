<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Income - Admin Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --emerald: #10b981;
            --bg: #030712;
            --card: rgba(17, 24, 39, 0.8);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #f1f5f9; 
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
        }

        .glass-card { 
            background: var(--card); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
        }

        .neo-input {
            background: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            transition: all 0.3s ease;
        }
        .neo-input:focus {
            border-color: var(--emerald) !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
        }

        .tab-btn { transition: all 0.3s ease; }
        .tab-btn.active {
            background: var(--emerald);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideIn 0.3s ease-out; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div id="login-screen" class="fixed inset-0 bg-[#030712] z-[9999] flex items-center justify-center p-6">
        <div class="glass-card p-10 w-full max-w-md text-center border-emerald-500/20 shadow-2xl">
            <div class="w-16 h-16 bg-emerald-500/10 rounded-2xl mx-auto flex items-center justify-center mb-6 border border-emerald-500/20">
                <i data-lucide="lock" class="w-8 h-8 text-emerald-500"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-white mb-2 tracking-tight">System <span class="text-emerald-500">Access</span></h1>
            <p class="text-slate-500 text-sm mb-8">Secure encrypted administrator portal</p>
            <div class="space-y-4">
                <input id="admin-pass-input" type="password" placeholder="••••••••" class="w-full neo-input px-6 py-4 rounded-xl text-center text-xl tracking-widest outline-none">
                <button id="login-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-bold text-white transition-all transform active:scale-95 shadow-lg">AUTHENTICATE</button>
                <p id="error-msg" class="text-red-400 text-xs font-bold hidden">ACCESS DENIED: INCORRECT KEY</p>
            </div>
        </div>
    </div>

    <div id="admin-content" class="max-w-7xl mx-auto hidden">
        
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-8">
            <div class="lg:col-span-1 glass-card p-6 flex items-center gap-4 border-l-4 border-l-emerald-500">
                <div class="p-3 bg-emerald-500/10 rounded-lg text-emerald-500"><i data-lucide="users"></i></div>
                <div><p class="text-[10px] uppercase font-black text-slate-500 tracking-wider">Total Users</p><p id="stat-users" class="text-2xl font-bold">0</p></div>
            </div>
            <div class="glass-card p-6 flex items-center gap-4 border-l-4 border-l-blue-500">
                <div class="p-3 bg-blue-500/10 rounded-lg text-blue-500"><i data-lucide="wallet"></i></div>
                <div><p class="text-[10px] uppercase font-black text-slate-500 tracking-wider">Total User Bal.</p><p id="stat-balance" class="text-2xl font-bold">৳ 0</p></div>
            </div>
            <div class="glass-card p-6 flex items-center gap-4 border-l-4 border-l-orange-500">
                <div class="p-3 bg-orange-500/10 rounded-lg text-orange-500"><i data-lucide="hourglass"></i></div>
                <div><p class="text-[10px] uppercase font-black text-slate-500 tracking-wider">Pending Pay</p><p id="stat-pending" class="text-2xl font-bold">0</p></div>
            </div>
            <button onclick="logout()" class="glass-card p-6 flex items-center justify-center gap-2 text-red-400 hover:bg-red-500/10 transition-colors font-bold uppercase text-xs tracking-widest">
                <i data-lucide="log-out" class="w-4 h-4"></i> Sign Out
            </button>
        </div>

        <div class="flex gap-2 mb-8 bg-slate-900/40 p-1.5 rounded-2xl w-fit overflow-x-auto">
            <button onclick="showTab('settings', this)" class="tab-btn active px-6 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2">
                <i data-lucide="settings-2" class="w-4 h-4"></i> Task Config
            </button>
            <button onclick="showTab('users', this)" class="tab-btn px-6 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2">
                <i data-lucide="users-2" class="w-4 h-4"></i> Users
            </button>
            <button onclick="showTab('payouts', this)" class="tab-btn px-6 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2">
                <i data-lucide="banknote" class="w-4 h-4"></i> Payouts
            </button>
            <button onclick="showTab('broadcast', this)" class="tab-btn px-6 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2">
                <i data-lucide="megaphone" class="w-4 h-4"></i> Notice
            </button>
        </div>

        <div id="settings" class="tab-content active">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass-card p-8 space-y-6">
                    <h3 class="text-lg font-bold flex items-center gap-2"><i data-lucide="zap" class="text-yellow-500"></i> Task Links</h3>
                    <div class="space-y-4">
                        <div class="grid grid-cols-1 gap-4">
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase">Main Link 1</label><input id="linkWeb1" type="text" class="w-full neo-input p-3.5 rounded-xl text-sm mt-1"></div>
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase">Main Link 2</label><input id="linkWeb2" type="text" class="w-full neo-input p-3.5 rounded-xl text-sm mt-1"></div>
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase">Main Link 3</label><input id="linkWeb3" type="text" class="w-full neo-input p-3.5 rounded-xl text-sm mt-1"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 border-t border-white/5 pt-4">
                            <div><label class="text-[10px] font-bold text-blue-500 uppercase">Bonus Link 1</label><input id="linkWeb4" type="text" class="w-full neo-input p-3.5 rounded-xl text-sm mt-1"></div>
                            <div><label class="text-[10px] font-bold text-blue-500 uppercase">Bonus Link 2</label><input id="linkWeb5" type="text" class="w-full neo-input p-3.5 rounded-xl text-sm mt-1"></div>
                        </div>
                    </div>
                </div>
                <div class="glass-card p-8 space-y-6">
                    <h3 class="text-lg font-bold flex items-center gap-2"><i data-lucide="headphones" class="text-blue-500"></i> Support Details</h3>
                    <div class="space-y-4">
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">Telegram Support</label><input id="linkTelegram" type="text" class="w-full neo-input p-3.5 rounded-xl text-sm mt-1"></div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">Admin Username</label><input id="linkAdmin" type="text" class="w-full neo-input p-3.5 rounded-xl text-sm mt-1" placeholder="@username"></div>
                    </div>
                    <button id="save-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-bold mt-4 shadow-emerald-500/10 shadow-xl transition-all">SAVE CONFIGURATION</button>
                </div>
            </div>
        </div>

        <div id="users" class="tab-content">
            <div class="glass-card overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-black/50 text-[10px] font-bold text-slate-500 uppercase">
                            <tr>
                                <th class="p-5">Member</th>
                                <th class="p-5">Wallet</th>
                                <th class="p-5">Refer</th>
                                <th class="p-5 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="user-list" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="payouts" class="tab-content">
            <div id="payout-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="broadcast" class="tab-content">
            <div class="max-w-xl mx-auto glass-card p-8">
                <h3 class="text-xl font-bold mb-6 text-center italic">Dashboard Announcement</h3>
                <textarea id="broadcast-msg" rows="5" class="w-full neo-input p-4 rounded-2xl mb-6 outline-none" placeholder="Enter message for all users..."></textarea>
                <div class="flex gap-4">
                    <button id="send-broadcast" class="flex-1 bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold shadow-lg transition-all">PUSH NOTICE</button>
                    <button id="clear-broadcast" class="px-6 py-4 rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white font-bold transition-all">CLEAR</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, onSnapshot, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpH_zn1KQPcIsPojC02UzXLdc017e-Unw",
            projectId: "bdincomezone-767b4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ADMIN_PASSWORD = "Riaz@@1207"; 

        // Auth
        document.getElementById('login-btn').onclick = () => {
            if(document.getElementById('admin-pass-input').value === ADMIN_PASSWORD) {
                sessionStorage.setItem('isAdmin', 'true');
                checkAuth();
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
                setTimeout(() => document.getElementById('error-msg').classList.add('hidden'), 2000);
            }
        };

        function checkAuth() {
            if(sessionStorage.getItem('isAdmin') === 'true') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadConfig();
                syncData();
            }
        }

        window.logout = () => { sessionStorage.removeItem('isAdmin'); location.reload(); };

        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            lucide.createIcons();
        };

        // DB Operations
        async function loadConfig() {
            const snap = await getDoc(doc(db, "config", "main"));
            if(snap.exists()) {
                const d = snap.data();
                for(let i=1; i<=5; i++) document.getElementById('linkWeb'+i).value = d['linkWeb'+i] || '';
                document.getElementById('linkTelegram').value = d.linkTelegram || '';
                document.getElementById('linkAdmin').value = d.linkAdmin || '';
                document.getElementById('broadcast-msg').value = d.announcement || '';
            }
        }

        document.getElementById('save-btn').onclick = async () => {
            const data = {
                linkTelegram: document.getElementById('linkTelegram').value,
                linkAdmin: document.getElementById('linkAdmin').value
            };
            for(let i=1; i<=5; i++) data['linkWeb'+i] = document.getElementById('linkWeb'+i).value;
            await updateDoc(doc(db, "config", "main"), data);
            alert("System Config Saved!");
        };

        function syncData() {
            // Users Sync
            onSnapshot(collection(db, "users"), (snap) => {
                let totalBal = 0;
                document.getElementById('stat-users').innerText = snap.size;
                const list = document.getElementById('user-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const u = d.data();
                    totalBal += (u.balance || 0);
                    list.innerHTML += `
                        <tr class="hover:bg-white/[0.02]">
                            <td class="p-5">
                                <p class="text-sm font-bold text-white">${u.name || 'User'}</p>
                                <p class="text-[10px] text-slate-500 font-mono">${u.uid}</p>
                            </td>
                            <td class="p-5 font-bold text-emerald-400">৳${(u.balance || 0).toFixed(2)}</td>
                            <td class="p-5 font-bold text-slate-400">${u.totalRefer || 0}</td>
                            <td class="p-5 text-right">
                                <button onclick="editUser('${u.uid}', ${u.balance}, ${u.totalRefer})" class="p-2 bg-white/5 rounded-lg text-slate-400 hover:text-emerald-500 transition-all">
                                    <i data-lucide="edit-2" class="w-4 h-4"></i>
                                </button>
                            </td>
                        </tr>`;
                });
                document.getElementById('stat-balance').innerText = '৳ ' + Math.floor(totalBal);
                lucide.createIcons();
            });

            // Payouts Sync
            onSnapshot(collection(db, "withdrawals"), (snap) => {
                document.getElementById('stat-pending').innerText = snap.size;
                const list = document.getElementById('payout-list');
                list.innerHTML = snap.empty ? '<p class="col-span-full text-center text-slate-500 py-10 italic">No pending requests</p>' : '';
                snap.forEach(d => {
                    const w = d.data();
                    list.innerHTML += `
                        <div class="glass-card p-6 border-l-4 border-l-emerald-500">
                            <div class="flex justify-between mb-4">
                                <span class="bg-emerald-500/10 text-emerald-500 px-3 py-1 rounded-full text-[10px] font-black uppercase">${w.method}</span>
                                <button onclick="rejectPayout('${d.id}', '${w.uid}', ${w.amount})" class="text-red-500/50 hover:text-red-500 transition-all"><i data-lucide="x-circle"></i></button>
                            </div>
                            <h4 class="text-2xl font-black text-white mb-4">৳ ${w.amount}</h4>
                            <div class="bg-black/40 p-3 rounded-xl mb-4 border border-white/5">
                                <p class="text-[9px] text-slate-500 uppercase font-black">Account Number</p>
                                <p class="font-bold text-sm text-white">${w.number}</p>
                            </div>
                            <button onclick="approvePayout('${d.id}')" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold text-xs transition-all">MARK AS PAID</button>
                        </div>`;
                });
                lucide.createIcons();
            });
        }

        window.editUser = async (uid, bal, ref) => {
            const b = prompt("Enter new balance:", bal);
            const r = prompt("Enter total refers:", ref);
            if(b !== null && r !== null) await updateDoc(doc(db, "users", uid), { balance: parseFloat(b), totalRefer: parseInt(r) });
        };

        window.approvePayout = async (id) => { if(confirm("Approve payment? This will clear the request.")) await deleteDoc(doc(db, "withdrawals", id)); };
        
        window.rejectPayout = async (id, uid, amt) => {
            if(confirm("Reject and refund amount to user?")) {
                await updateDoc(doc(db, "users", uid), { balance: increment(amt) });
                await deleteDoc(doc(db, "withdrawals", id));
            }
        };

        document.getElementById('send-broadcast').onclick = async () => {
            const msg = document.getElementById('broadcast-msg').value;
            await updateDoc(doc(db, "config", "main"), { announcement: msg });
            alert("Broadcast Updated!");
        };

        document.getElementById('clear-broadcast').onclick = async () => {
            document.getElementById('broadcast-msg').value = '';
            await updateDoc(doc(db, "config", "main"), { announcement: '' });
            alert("Broadcast Cleared!");
        };

        checkAuth();
        lucide.createIcons();
    </script>
</body>
</html>
